<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Paesaggio illustrato con colline verdi, sole e alberi">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fe2e6"/>
      <stop offset="1" stop-color="#cdefe2"/>
    </linearGradient>
    <linearGradient id="hillFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74c389"/>
      <stop offset="1" stop-color="#5cb277"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe7a3" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffe7a3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="1290" cy="250" r="170" fill="url(#sunGlow)"/>
  <circle cx="1290" cy="250" r="86" fill="#ffd76a"/>

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.92">
    <g>
      <ellipse cx="300" cy="190" rx="78" ry="40"/>
      <ellipse cx="360" cy="205" rx="62" ry="34"/>
      <ellipse cx="244" cy="208" rx="52" ry="30"/>
    </g>
    <g opacity="0.85">
      <ellipse cx="900" cy="140" rx="64" ry="32"/>
      <ellipse cx="952" cy="152" rx="50" ry="26"/>
      <ellipse cx="854" cy="154" rx="42" ry="24"/>
    </g>
  </g>

  <!-- Birds -->
  <g stroke="#3f7d63" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M620 250 q18 -16 36 0 q18 -16 36 0"/>
    <path d="M720 300 q14 -12 28 0 q14 -12 28 0"/>
  </g>

  <!-- Distant hills -->
  <path d="M0 640 Q260 540 540 612 T1080 600 T1600 596 L1600 1000 L0 1000 Z" fill="#d2efce"/>
  <!-- Mid hills -->
  <path d="M0 740 Q320 650 660 716 T1240 700 T1600 712 L1600 1000 L0 1000 Z" fill="#9ad9a3"/>

  <!-- River -->
  <path d="M700 1000 C740 880 660 820 720 760 C770 712 700 672 760 640 L860 660 C812 692 880 730 832 778 C792 818 880 880 840 1000 Z" fill="#bdeede" opacity="0.9"/>

  <!-- Front hill -->
  <path d="M0 840 Q380 752 760 812 T1600 826 L1600 1000 L0 1000 Z" fill="url(#hillFront)"/>

  <!-- Trees on mid hill -->
  <g>
    <g transform="translate(250 690)">
      <rect x="-7" y="0" width="14" height="46" rx="6" fill="#8a5a36"/>
      <circle cx="0" cy="-18" r="42" fill="#3f9e6a"/>
      <circle cx="-26" cy="2" r="30" fill="#4aae77"/>
      <circle cx="26" cy="2" r="30" fill="#4aae77"/>
    </g>
    <g transform="translate(1170 712) scale(0.85)">
      <rect x="-7" y="0" width="14" height="46" rx="6" fill="#8a5a36"/>
      <circle cx="0" cy="-18" r="42" fill="#3f9e6a"/>
      <circle cx="-26" cy="2" r="30" fill="#4aae77"/>
      <circle cx="26" cy="2" r="30" fill="#4aae77"/>
    </g>
  </g>

  <!-- Trees on front hill -->
  <g>
    <g transform="translate(150 858) scale(1.15)">
      <rect x="-8" y="0" width="16" height="54" rx="7" fill="#7a4f30"/>
      <circle cx="0" cy="-22" r="48" fill="#2f8c5c"/>
      <circle cx="-30" cy="2" r="34" fill="#39a06a"/>
      <circle cx="30" cy="2" r="34" fill="#39a06a"/>
    </g>
    <g transform="translate(1320 866) scale(1.25)">
      <rect x="-8" y="0" width="16" height="54" rx="7" fill="#7a4f30"/>
      <circle cx="0" cy="-22" r="48" fill="#2f8c5c"/>
      <circle cx="-30" cy="2" r="34" fill="#39a06a"/>
      <circle cx="30" cy="2" r="34" fill="#39a06a"/>
    </g>
  </g>
</svg>
